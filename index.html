<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>كارت التواصل | X5</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0A0A;
    --primary:#1A1A1A;
    --accent:#F5C518;
    --accent-dark:#D4A80F;
    --ice:#FFF8E1;
    --white:#FFFFFF;
    --slate:#8A8A8A;
    --line: rgba(245,197,24,0.2);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html{
    min-height:100%;
    background:#0A0A0A;
  }

  body{
    min-height:100vh;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Tajawal', sans-serif;
    padding:40px 16px;
    position:relative;
    overflow-x:hidden;
    background:
      radial-gradient(120% 100% at 15% 10%, #1A1A1A 0%, transparent 55%),
      radial-gradient(120% 100% at 90% 90%, #0D0D0D 0%, transparent 55%),
      #0A0A0A;
  }

  #bg-canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:0;
    display:block;
  }

  .stage{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
  }

  .card{
    position:relative;
    width:520px;
    max-width:92vw;
    background: radial-gradient(120% 90% at 100% 0%, #1A1A1A 0%, #0A0A0A 45%, #050505 100%);
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.7), 0 8px 20px -8px rgba(0,0,0,0.5), 0 0 40px rgba(245,197,24,0.08);
    padding:60px 40px 52px;
    display:flex;
    flex-direction:column;
    color:var(--white);
    border:1px solid rgba(245,197,24,0.15);
  }

  /* signature: connective node lattice, quiet, upper-right */
  .lattice{
    position:absolute;
    top:-40px;
    left:-40px;
    width:260px;
    height:260px;
    opacity:0.55;
    pointer-events:none;
  }

  .card::after{
    content:"";
    position:absolute;
    right:-90px;
    bottom:-90px;
    width:280px;
    height:280px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(245,197,24,0.2) 0%, rgba(245,197,24,0) 70%);
    pointer-events:none;
  }

  .brandmark{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    z-index:2;
  }

  .brandmark .dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 5px rgba(62,142,247,0.18);
    flex-shrink:0;
  }

  .brandmark span{
    font-family:'Cairo', sans-serif;
    font-weight:600;
    font-size:13px;
    letter-spacing:1px;
    color:var(--accent);
    text-transform:uppercase;
  }

  .company{
    margin-top:26px;
    font-family:'Cairo', sans-serif;
    font-weight:800;
    font-size:40px;
    line-height:1.25;
    text-align:center;
    z-index:2;
  }

  .tagline{
    margin-top:10px;
    font-size:15px;
    font-weight:400;
    color:#B9C7DE;
    line-height:1.7;
    text-align:center;
    z-index:2;
  }

  .divider{
    margin:28px 0 24px;
    height:1px;
    width:100%;
    background: linear-gradient(90deg, rgba(245,197,24,0.3), transparent);
    z-index:2;
  }

  .contact-list{
    display:flex;
    flex-direction:column;
    gap:20px;
    z-index:2;
  }

  .contact-row{
    display:flex;
    align-items:center;
    gap:14px;
  }

  a.contact-row{
    text-decoration:none;
    color:inherit;
    transition:transform 0.15s ease;
  }

  a.contact-row:hover{
    transform:translateX(-3px);
  }

  html[dir="rtl"] a.contact-row:hover{
    transform:translateX(3px);
  }

  .icon-badge{
    width:38px;
    height:38px;
    border-radius:11px;
    background:rgba(245,197,24,0.12);
    border:1px solid rgba(245,197,24,0.25);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    transition:background 0.15s ease, border-color 0.15s ease;
  }

  a.contact-row:hover .icon-badge{
    background:var(--accent);
    border-color:var(--accent);
  }

  .icon-badge svg{
    width:18px;
    height:18px;
    stroke:var(--accent);
    fill:none;
    transition:stroke 0.15s ease;
  }

  a.contact-row:hover .icon-badge svg{
    stroke:var(--white);
  }

  .contact-text{
    display:flex;
    flex-direction:column;
    gap:2px;
  }

  .contact-text b{
    font-weight:600;
    font-size:15px;
    color:var(--white);
    direction:ltr;
    text-align:right;
    unicode-bidi:plaintext;
    transition:color 0.15s ease;
  }

  a.contact-row:hover .contact-text b{
    color:var(--accent);
  }

  .contact-text small{
    font-size:11.5px;
    color:var(--slate);
    font-weight:400;
  }

  .socials{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:14px;
    z-index:2;
  }

  .social-pill{
    width:56px;
    height:56px;
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:16px;
    background:var(--accent);
    color:var(--ink);
    text-decoration:none;
    transition:transform 0.15s ease, background 0.15s ease;
  }

  .social-pill:hover{
    background:var(--accent-dark);
    transform:translateY(-2px);
  }

  .social-pill:hover svg{
    fill:var(--white);
  }

  .social-pill svg{
    width:24px;
    height:24px;
    fill:var(--ink);
  }

  .footer-note{
    margin-top:18px;
    text-align:center;
    font-size:11px;
    color:#666;
    letter-spacing:0.5px;
  }

  @media (max-width:480px){
    body{
      padding:0;
      align-items:stretch;
      justify-content:stretch;
    }
    .stage{
      width:100%;
      min-height:100vh;
      min-height:100dvh;
      justify-content:stretch;
      padding:0;
      gap:0;
    }
    .card{
      width:100%;
      max-width:100%;
      min-height:100vh;
      min-height:100dvh;
      border-radius:0;
      padding:40px 24px 36px;
      box-shadow:none;
      border:none;
    }
    .company{ font-size:32px; }
    .social-pill{ width:48px; height:48px; }
    .footer-note{ display:none; }
  }
</style>

<script>
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let w, h, dpr;
  let nodes = [];

  const PALETTE = ['#F5C518', '#D4A80F', '#FFE082'];
  const LINK_DIST = 150;
  const NODE_COUNT_DENSITY = 16000; // px^2 per node

  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    initNodes();
  }

  function initNodes(){
    const count = Math.max(24, Math.min(90, Math.floor((w * h) / NODE_COUNT_DENSITY)));
    nodes = new Array(count).fill(0).map(() => ({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.18,
      r: Math.random() * 1.6 + 0.8,
      c: PALETTE[Math.floor(Math.random() * PALETTE.length)]
    }));
  }

  function step(){
    ctx.clearRect(0, 0, w, h);

    for (const n of nodes){
      n.x += n.vx;
      n.y += n.vy;
      if (n.x < 0 || n.x > w) n.vx *= -1;
      if (n.y < 0 || n.y > h) n.vy *= -1;
    }

    for (let i = 0; i < nodes.length; i++){
      for (let j = i + 1; j < nodes.length; j++){
        const a = nodes[i], b = nodes[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < LINK_DIST){
          ctx.strokeStyle = `rgba(245,197,24,${(1 - dist / LINK_DIST) * 0.16})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    for (const n of nodes){
      ctx.beginPath();
      ctx.fillStyle = n.c;
      ctx.globalAlpha = 0.55;
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    if (!reduceMotion) requestAnimationFrame(step);
  }

  window.addEventListener('resize', resize);
  resize();
  step();
  if (reduceMotion) step(); // draw a single static frame
})();
</script>
